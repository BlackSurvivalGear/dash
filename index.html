<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BSG Global Strategic Awareness OSINT</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>


<header>

<h1>BSG Global Strategic Awareness OSINT</h1>

</header>


<div class="newsTicker">
<span id="ticker">Loading conflict headlines...</span>
</div>


<nav>

<button onclick="showTab('home')" class="active">Home</button>
<button onclick="showTab('news')">Conflict News</button>
<button onclick="showTab('map')">Conflict Map</button>
<button onclick="showTab('air')">Aircraft Watch</button>
<button onclick="showTab('marine')">Marine Watch</button>
<button onclick="showTab('cyber')">Cyber Attacks</button>
<button onclick="showTab('fire')">Fire Monitor</button>
<button onclick="showTab('overview')">Overview</button>

</nav>


<section id="home" class="tab active">

<h2>Global Strategic Awareness OSINT</h2>

<p>
Strategic monitoring platform integrating conflict intelligence, environmental monitoring and financial indicators.
</p>

</section>



<section id="news" class="tab">

<div id="newsGrid" class="newsGrid"></div>

</section>



<section id="map" class="tab">
<iframe src="https://liveuamap.com"></iframe>
</section>


<section id="air" class="tab">
<iframe src="https://globe.adsbexchange.com/?military=1"></iframe>
</section>


<section id="marine" class="tab">
<iframe src="https://www.marinetraffic.com/en/ais/embed/zoom:2"></iframe>
</section>


<section id="cyber" class="tab">
<iframe src="https://threatmap.checkpoint.com"></iframe>
</section>


<section id="fire" class="tab">
<iframe src="https://livingatlas.arcgis.com/wayback/#active=28190"></iframe>
</section>


<section id="overview" class="tab">

<div class="grid">

<iframe src="https://liveuamap.com"></iframe>
<iframe src="https://threatmap.checkpoint.com"></iframe>

</div>

</section>



<script>


function showTab(tabId){

document.querySelectorAll('.tab').forEach(tab=>{
tab.style.display='none'
})

document.querySelectorAll('nav button').forEach(btn=>{
btn.classList.remove('active')
})

document.getElementById(tabId).style.display='block'

event.target.classList.add('active')

}



async function loadNews(){

const feeds=[

"https://api.rss2json.com/v1/api.json?rss_url=https://feeds.bbci.co.uk/news/world/rss.xml",

"https://api.rss2json.com/v1/api.json?rss_url=https://www.aljazeera.com/xml/rss/all.xml",

"https://api.rss2json.com/v1/api.json?rss_url=https://www.reutersagency.com/feed/?best-topics=world&post_type=best",

"https://api.rss2json.com/v1/api.json?rss_url=https://sputnikglobe.com/export/rss2/archive/index.xml"

]


const container=document.getElementById("newsGrid")

container.innerHTML=""

let headlines=[]


for(const feed of feeds){

try{

const res=await fetch(feed)

const data=await res.json()


data.items.slice(0,3).forEach(article=>{

headlines.push(article.title)


const card=document.createElement("div")

card.className="newsCard"


card.innerHTML=`

<img src="${article.thumbnail || 'https://picsum.photos/600/300'}">

<div class="newsText">

<span class="source">${data.feed.title}</span>

<h3>${article.title}</h3>

<a href="${article.link}" target="_blank">Read report</a>

</div>

`

container.appendChild(card)

})

}catch(e){}

}


document.getElementById("ticker").textContent=headlines.join(" ◆ ")

}



document.addEventListener("DOMContentLoaded",()=>{

loadNews()

setInterval(loadNews,60000)

})


</script>


</body>
</html>
