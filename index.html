<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Global Strategic Awareness OSINT</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">

</head>


<body>


<header>

<div class="radarLogo" onclick="showTab(event,'home')">

<video autoplay muted loop playsinline>
<source src="RADAR3.mp4">
</video>

</div>


<h1>Global Strategic Awareness OSINT</h1>


<div class="headerMarkets">

<span id="goldPrice">GOLD --</span>
<span id="silverPrice">SILVER --</span>

</div>

</header>



<!-- CRYPTO TICKER -->

<div class="ticker-bar">

<div id="marketTicker" class="ticker-content">
Loading crypto market data...
</div>

</div>



<nav>

<button onclick="showTab(event,'home')" class="active">Home</button>
<button onclick="showTab(event,'live')">LIVE NEWS</button>
<button onclick="showTab(event,'map')">Conflict Map</button>
<button onclick="showTab(event,'air')">Aircraft Watch</button>
<button onclick="showTab(event,'marine')">Marine Watch</button>
<button onclick="showTab(event,'cyber')">Cyber Attacks</button>
<button onclick="showTab(event,'command')">Overview</button>
<button onclick="showTab(event,'gmap')">Map</button>

</nav>



<section id="home" class="tab active">

<div class="homePanel">

<img src="BSG2.png" class="homeBg">

<div class="homeOverlay">

<h2>Welcome to the BSG Global Strategic Awareness OSINT Platform</h2>

<p class="homeText">

This dashboard consolidates open-source intelligence monitoring tools into a unified global situational awareness interface.

</p>

</div>

</div>

</section>



<footer>

<div class="footerRadar">

<video autoplay muted loop playsinline>
<source src="RADAR3.mp4">
</video>

</div>

<a href="https://BlackSurvivalGear.com" target="_blank" class="footerLink">
BlackSurvivalGear.com
</a>

</footer>



<script>


function showTab(evt,id){

document.querySelectorAll(".tab").forEach(tab=>{
tab.classList.remove("active")
})

document.getElementById(id).classList.add("active")

document.querySelectorAll("nav button").forEach(btn=>{
btn.classList.remove("active")
})

evt.target.classList.add("active")

}



/* CRYPTO TICKER */

async function loadCryptoTicker(){

const url="https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=20&page=1&sparkline=false"

const res=await fetch(url)
const data=await res.json()

const ticker=document.getElementById("marketTicker")

ticker.innerHTML=""

data.forEach(coin=>{

const change=coin.price_change_percentage_24h||0
const color=change>=0?"#00ff88":"#ff4d4d"
const arrow=change>=0?"▲":"▼"

const item=document.createElement("span")

item.className="ticker-item"

item.innerHTML=`
<span class="ticker-symbol">${coin.symbol.toUpperCase()}</span>
$${coin.current_price.toLocaleString()}
<span style="color:${color}">
${arrow} ${change.toFixed(2)}%
</span>
`

ticker.appendChild(item)

})

}

loadCryptoTicker()
setInterval(loadCryptoTicker,30000)



/* GOLD SILVER HEADER */

async function loadMetals(){

try{

const goldRes = await fetch("https://api.gold-api.com/price/XAU")
const gold = await goldRes.json()

const silverRes = await fetch("https://api.gold-api.com/price/XAG")
const silver = await silverRes.json()

document.getElementById("goldPrice").innerText="GOLD $" + Math.round(gold.price)
document.getElementById("silverPrice").innerText="SILVER $" + silver.price.toFixed(2)

}
catch{

document.getElementById("goldPrice").innerText="GOLD --"
document.getElementById("silverPrice").innerText="SILVER --"

}

}

loadMetals()
setInterval(loadMetals,60000)


</script>


</body>
</html>
