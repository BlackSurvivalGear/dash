<script>


window.addEventListener("load",()=>{

const splash=document.getElementById("introRadar")

setTimeout(()=>{

splash.style.opacity="0"

setTimeout(()=>{ splash.remove() },600)

},1800)

})



function updateClock(){

const now = new Date()

const days=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"]
const months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"]

let day=days[now.getDay()]
let date=now.getDate()
let month=months[now.getMonth()]
let year=now.getFullYear()

let hours=now.getHours()
let minutes=now.getMinutes()

let ampm=hours>=12?"PM":"AM"

hours=hours%12
hours=hours?hours:12
minutes=minutes<10?"0"+minutes:minutes

document.getElementById("dateTime").textContent =
`${day} ${date} ${month} ${year}, ${hours}:${minutes}${ampm}`

}

setInterval(updateClock,1000)
updateClock()



document.querySelectorAll("nav button").forEach(btn=>{

btn.onclick=()=>{

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))
document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"))

btn.classList.add("active")

document.getElementById(btn.dataset.tab).classList.add("active")

const subMenu=document.getElementById("subMenuBar")

document.getElementById("liveMenu").style.display="none"
document.getElementById("marineMenu").style.display="none"

if(btn.dataset.tab==="live"){
subMenu.style.display="block"
document.getElementById("liveMenu").style.display="flex"
}

else if(btn.dataset.tab==="marine"){
subMenu.style.display="block"
document.getElementById("marineMenu").style.display="flex"
}

else{
subMenu.style.display="none"
}

}

})



function showLive(e,channel){

document.querySelectorAll("#liveMenu button").forEach(b=>b.classList.remove("active"))
e.target.classList.add("active")

const frame=document.getElementById("liveFrame")
const single=document.getElementById("liveSingle")
const quad=document.getElementById("liveQuad")

single.style.display="block"
quad.style.display="none"

if(channel==="rt")
frame.src="https://rumble.com/embed/v33aw1a/?pub=4jw3x3"

if(channel==="aj")
frame.src="https://www.youtube.com/embed/gCNeDWCI0vo"

if(channel==="sky")
frame.src="https://www.youtube.com/embed/9Auq9mYxFEE"

if(channel==="bloomberg")
frame.src="https://www.youtube.com/embed/iEpJwprxDdk"

if(channel==="quad"){
single.style.display="none"
quad.style.display="grid"
}

}



function showMarine(e,point){

document.querySelectorAll("#marineMenu button").forEach(b=>b.classList.remove("active"))
e.target.classList.add("active")

const frame=document.getElementById("marineFrame")

if(point==="hormuz")
frame.src="https://www.marinetraffic.com/en/ais/embed/zoom:6/lat:26.5/lon:56"

if(point==="malacca")
frame.src="https://www.marinetraffic.com/en/ais/embed/zoom:6/lat:2.5/lon:101"

if(point==="bab")
frame.src="https://www.marinetraffic.com/en/ais/embed/zoom:6/lat:12.6/lon:43.3"

if(point==="suez")
frame.src="https://www.marinetraffic.com/en/ais/embed/zoom:6/lat:30.2/lon:32.3"

if(point==="panama")
frame.src="https://www.marinetraffic.com/en/ais/embed/zoom:6/lat:9.2/lon:-79.9"

if(point==="bosporus")
frame.src="https://www.marinetraffic.com/en/ais/embed/zoom:6/lat:41.1/lon:29"

if(point==="gibraltar")
frame.src="https://www.marinetraffic.com/en/ais/embed/zoom:6/lat:36/lon:-5.3"

if(point==="dover")
frame.src="https://www.marinetraffic.com/en/ais/embed/zoom:6/lat:51/lon:1"

}



function fullscreenQuad(){

const quad=document.getElementById("liveQuad")

if(quad.requestFullscreen){
quad.requestFullscreen()
}

}

</script>
