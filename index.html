<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BSG Strategic Awareness OSINT</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">

</head>

<body>

<header class="mainHeader">

<div class="headerLeft">

<div class="radarLogo">
<video autoplay muted loop playsinline>
<source src="RADAR3.mp4" type="video/mp4">
</video>
</div>

<h1>Global Strategic Awareness OSINT</h1>

</div>

<div id="dateTime"></div>

</header>



<nav>

<button data-tab="home" class="active">Home</button>
<button data-tab="live">LIVE NEWS</button>
<button data-tab="markets">Market</button>
<button data-tab="conflict">Conflict Map</button>
<button data-tab="aircraft">Aircraft Watch</button>
<button data-tab="marine">Marine Watch</button>
<button data-tab="cyber">Cyber Attacks</button>
<button data-tab="overview">Overview</button>
<button data-tab="radio">Global Radio</button>

</nav>



<div id="subMenuBar">

<div id="liveMenu" class="subMenu">

<button onclick="showLive('rt')">RT</button>
<button onclick="showLive('aj')">Al Jazeera</button>
<button onclick="showLive('sky')">Sky</button>
<button onclick="showLive('wion')">WION</button>
<button onclick="showLive('quad')">Quad View</button>
<button onclick="showLive('fullscreen')">Full Screen</button>

</div>

</div>



<section id="home" class="tab active">

<div class="homeHero">

<img src="hero.jpg" class="heroImage">

<div class="heroOverlay">

<h2>BSG Strategic Awareness Dashboard</h2>

<p>
Integrated OSINT monitoring platform providing real-time intelligence across conflicts, markets, cyber activity, aviation tracking and maritime movement.
</p>

</div>

</div>

</section>



<section id="live" class="tab">

<div id="liveSingle" class="livePlayer">

<iframe id="liveFrame"
src="https://rumble.com/embed/v33aw1a/?pub=4jw3x3"
allow="fullscreen"
loading="lazy">
</iframe>

</div>



<div id="liveQuad" class="quadGrid">

<iframe src="https://rumble.com/embed/v33aw1a/?pub=4jw3x3"></iframe>
<iframe src="https://www.youtube.com/embed/gCNeDWCI0vo"></iframe>
<iframe src="https://www.youtube.com/embed/9Auq9mYxFEE"></iframe>
<iframe src="https://www.youtube.com/embed/YDvsBbKfLPA"></iframe>

</div>

</section>



<section id="conflict" class="tab">
<iframe src="https://iran.liveuamap.com"></iframe>
</section>

<section id="aircraft" class="tab">
<iframe src="https://globe.adsbexchange.com"></iframe>
</section>

<section id="marine" class="tab">
<iframe src="https://www.marinetraffic.com/en/ais/embed/zoom:2"></iframe>
</section>

<section id="cyber" class="tab">
<iframe src="https://threatmap.checkpoint.com"></iframe>
</section>

<section id="radio" class="tab">
<iframe src="https://radio.garden"></iframe>
</section>



<footer>

<div class="footerContent">

<div class="footerLogo">
<video autoplay muted loop playsinline>
<source src="RADAR3.mp4" type="video/mp4">
</video>
</div>

<a href="https://BlackSurvivalGear.com">BlackSurvivalGear.com</a>

<div class="versionTag">BSG Strategic Awareness OSINT — V3</div>

</div>

</footer>



<script>

function updateClock(){

const now=new Date()

document.getElementById("dateTime").textContent=
now.toLocaleString()

}

setInterval(updateClock,1000)
updateClock()



document.querySelectorAll("nav button").forEach(btn=>{

btn.onclick=()=>{

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))
document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"))

btn.classList.add("active")

document.getElementById(btn.dataset.tab).classList.add("active")

document.querySelectorAll(".subMenu").forEach(m=>m.classList.remove("active"))

if(btn.dataset.tab==="live"){
document.getElementById("liveMenu").classList.add("active")
}

}

})



function showLive(channel){

const frame=document.getElementById("liveFrame")
const single=document.getElementById("liveSingle")
const quad=document.getElementById("liveQuad")

single.style.display="block"
quad.style.display="none"

if(channel==="rt")
frame.src="https://rumble.com/embed/v33aw1a/?pub=4jw3x3"

if(channel==="aj")
frame.src="https://www.youtube.com/embed/gCNeDWCI0vo"

if(channel==="sky")
frame.src="https://www.youtube.com/embed/9Auq9mYxFEE"

if(channel==="wion")
frame.src="https://www.youtube.com/embed/YDvsBbKfLPA"

if(channel==="quad"){
single.style.display="none"
quad.style.display="grid"
}

if(channel==="fullscreen"){

single.style.display="none"
quad.style.display="grid"

if(quad.requestFullscreen){
quad.requestFullscreen()
}

}

}

</script>

</body>
</html>
