<script>

/* TAB SYSTEM */

document.querySelectorAll("nav button").forEach(btn=>{
btn.addEventListener("click",function(){

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))
document.getElementById(this.dataset.tab).classList.add("active")

document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"))
this.classList.add("active")

})
})



/* LIVE NEWS */

function showLive(channel){

const frame=document.getElementById("liveFrame")
const single=document.getElementById("liveSingle")
const quad=document.getElementById("quadView")

const streams={
rt:"https://rumble.com/embed/v33aw1a/?pub=4jw3x3",
aj:"https://www.youtube.com/embed/gCNeDWCI0vo",
sky:"https://www.youtube.com/embed/YDvsBbKfLPA",
wion:"https://www.youtube.com/embed/vfszY1JYbMc"
}

if(channel==="quad"){

single.style.display="none"
quad.style.display="grid"
return

}

quad.style.display="none"
single.style.display="block"

frame.src=streams[channel]

}



/* BUSINESS NEWS */

function showBiz(channel){

const frame=document.getElementById("bizFrame")
const single=document.getElementById("bizSingle")
const quad=document.getElementById("bizQuad")

const streams={
bloomberg:"https://www.youtube.com/embed/dp8PhLsUcFE",
cnbc:"https://www.youtube.com/embed/9NyxcX3rhQs",
reuters:"https://www.youtube.com/embed/nK0H37V9h6c",
yahoo:"https://www.youtube.com/embed/iEpJwprxDdk"
}

if(channel==="quad"){

single.style.display="none"
quad.style.display="grid"
return

}

quad.style.display="none"
single.style.display="block"

frame.src=streams[channel]

}



/* BOOT SEQUENCE */

window.addEventListener("load",function(){

const splash=document.getElementById("introRadar")
const bar=document.getElementById("bootBar")

let progress=0

const boot=setInterval(function(){

progress+=4
bar.style.width=progress+"%"

if(progress>=100){

clearInterval(boot)

setTimeout(function(){

splash.style.opacity="0"

setTimeout(()=>{
splash.style.display="none"
},1200)

},1200)

}

},120)

/* failsafe */

setTimeout(()=>{
splash.style.display="none"
},8000)

})

</script>
