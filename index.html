<script>


window.addEventListener("load",()=>{

const splash=document.getElementById("introRadar")

setTimeout(()=>{

splash.style.opacity="0"

setTimeout(()=>{ splash.remove() },600)

},1800)

})



function updateClock(){
document.getElementById("dateTime").textContent=new Date().toLocaleString()
}

setInterval(updateClock,1000)



document.querySelectorAll("nav button").forEach(btn=>{

btn.onclick=()=>{

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))
document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"))

btn.classList.add("active")

document.getElementById(btn.dataset.tab).classList.add("active")

const subMenu=document.getElementById("subMenuBar")

if(btn.dataset.tab==="live"){
subMenu.style.display="block"
}else{
subMenu.style.display="none"
}

}

})



function showLive(e,channel){

document.querySelectorAll(".subMenu button").forEach(b=>b.classList.remove("active"))
e.target.classList.add("active")

const frame=document.getElementById("liveFrame")
const single=document.getElementById("liveSingle")
const quad=document.getElementById("liveQuad")

single.style.display="block"
quad.style.display="none"

if(channel==="rt")
frame.src="https://rumble.com/embed/v33aw1a/?pub=4jw3x3"

if(channel==="aj")
frame.src="https://www.youtube.com/embed/gCNeDWCI0vo"

if(channel==="sky")
frame.src="https://www.youtube.com/embed/9Auq9mYxFEE"

if(channel==="bloomberg")
frame.src="https://www.youtube.com/embed/dp8PhLsUcFE"

if(channel==="quad"){
single.style.display="none"
quad.style.display="grid"
}

}



function fullscreenQuad(){

const quad=document.getElementById("liveQuad")

if(quad.requestFullscreen){
quad.requestFullscreen()
}

}

</script>


</body>
</html>
