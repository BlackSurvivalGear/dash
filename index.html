<!-- FOOTER -->

<div class="footerRadar">

<video autoplay muted loop playsinline>
<source src="RADAR3.mp4">
</video>

<a href="https://BlackSurvivalGear.com" target="_blank">BlackSurvivalGear.com</a>

<div class="versionTag">BSG Strategic Awareness OSINT — V3</div>

</footer>



<script>



/* REMOVE SPLASH */

setTimeout(function(){

const splash=document.getElementById("introRadar");

if(splash){
splash.remove();
}

},4000);



/* CLOCK */

function updateClock(){

const now=new Date()

const days=["SUN","MON","TUE","WED","THU","FRI","SAT"]
const months=["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"]

let day=days[now.getDay()]
let date=now.getDate()
let month=months[now.getMonth()]
let year=now.getFullYear()

let hours=now.getHours()
let minutes=now.getMinutes()

let ampm=hours>=12?"PM":"AM"

hours=hours%12
hours=hours?hours:12

minutes=minutes<10?"0"+minutes:minutes

document.getElementById("dateTime").textContent =
`${day} ${date} ${month} ${year} • ${hours}:${minutes}${ampm}`

}

updateClock()
setInterval(updateClock,1000)



/* TAB SWITCH */

document.querySelectorAll("nav button").forEach(btn=>{

btn.addEventListener("click",()=>{

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))
document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"))

btn.classList.add("active")

document.getElementById(btn.dataset.tab).classList.add("active")

document.querySelectorAll(".subMenu").forEach(m=>m.classList.remove("active"))

if(btn.dataset.tab==="live")
document.getElementById("liveMenu").classList.add("active")

if(btn.dataset.tab==="markets")
document.getElementById("marketMenu").classList.add("active")

})

})



/* LIVE CHANNEL SWITCH */

function showLive(channel){

const frame=document.getElementById("liveFrame")
const single=document.getElementById("liveSingle")
const quad=document.getElementById("liveQuad")

single.style.display="block"
quad.style.display="none"

if(channel==="rt")
frame.src="https://rumble.com/embed/v33aw1a/?pub=4jw3x3"

if(channel==="aj")
frame.src="https://www.youtube.com/embed/gCNeDWCI0vo"

if(channel==="sky")
frame.src="https://www.youtube.com/embed/9Auq9mYxFEE"

if(channel==="wion")
frame.src="https://www.youtube.com/embed/YDvsBbKfLPA"

if(channel==="quad"){
single.style.display="none"
quad.style.display="grid"
}

}



/* MARKET SWITCH */

function showMarketPanel(panel){

document.querySelectorAll(".marketPanel").forEach(p=>{
p.classList.remove("active")
})

document.getElementById("market"+panel.charAt(0).toUpperCase()+panel.slice(1)).classList.add("active")

}

</script>

</body>
</html>
