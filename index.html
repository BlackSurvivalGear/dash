<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>BSG Strategic Awareness</title>

<style>

:root{
--bsg-dark:#071e16;
--bsg-green:#0b2f22;
--bsg-panel:#0f3a2a;
--bsg-border:#1e5a42;
--bsg-gold:#c6a55a;
--bsg-text:#d7e8df;
}

html,body{
margin:0;
padding:0;
height:100%;
background:var(--bsg-dark);
font-family:Segoe UI,Arial;
color:var(--bsg-text);
}

/* WATERMARK */

body::before{
content:"";
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:900px;
height:900px;
background-image:url("bsg.jpg");
background-size:contain;
background-repeat:no-repeat;
opacity:0.035;
pointer-events:none;
z-index:0;
}

/* HEADER */

.header{
display:flex;
align-items:center;
gap:16px;
padding:16px 22px;
font-size:28px;
color:var(--bsg-text);
border-bottom:1px solid var(--bsg-border);
position:relative;
z-index:1;
}

.logo{
height:84px;
}

/* TABS */

.tabs{
display:flex;
background:var(--bsg-green);
border-bottom:1px solid var(--bsg-border);
position:relative;
z-index:1;
}

.tabs button{
padding:12px 18px;
background:var(--bsg-green);
border:none;
color:var(--bsg-text);
cursor:pointer;
border-right:1px solid var(--bsg-border);
font-weight:500;
}

.tabs button:hover{
background:#174734;
}

.tabs button.active{
background:var(--bsg-gold);
color:var(--bsg-dark);
font-weight:600;
box-shadow:0 0 10px rgba(198,165,90,0.6);
}

/* PANELS */

.section{
display:none;
padding:12px;
position:relative;
z-index:1;
}

.section.active{
display:block;
}

/* NEWS FEED */

.feed{
height:70vh;
overflow:auto;
background:rgba(5,20,14,0.97);
border-radius:6px;
padding:12px;
backdrop-filter:blur(2px);
}

.card{
display:flex;
gap:12px;
padding:12px;
border-bottom:1px solid var(--bsg-border);
background:rgba(7,25,18,0.85);
border-radius:4px;
margin-bottom:6px;
}

.thumb{
width:80px;
height:60px;
object-fit:cover;
border-radius:4px;
}

.title{
font-size:15px;
color:var(--bsg-text);
}

.meta{
font-size:12px;
color:#8fb9a6;
}

.link{
font-size:12px;
color:var(--bsg-gold);
text-decoration:none;
}

/* MAPS */

iframe{
width:100%;
height:92vh;
border:none;
border-radius:6px;
}

/* FOOTER */

footer{
position:fixed;
bottom:0;
left:0;
width:100%;
background:var(--bsg-dark);
border-top:1px solid var(--bsg-border);
text-align:center;
padding:8px;
font-size:14px;
color:var(--bsg-gold);
letter-spacing:1px;
z-index:2;
}

footer a{
color:var(--bsg-gold);
text-decoration:none;
font-weight:600;
}

footer a:hover{
text-decoration:underline;
}

</style>

</head>

<body>

<div class="header">

<img class="logo" src="bsg.jpg">

BSG Strategic Awareness

</div>

<div class="tabs">

<button class="active" onclick="showTab('news')">Conflict News</button>
<button onclick="showTab('map')">Conflict Map</button>
<button onclick="showTab('air')">Aircraft Watch</button>
<button onclick="showTab('marine')">Marine Watch</button>

</div>

<!-- CONFLICT NEWS -->

<div id="news" class="section active">
<div class="feed" id="newsFeed">Loading intelligence feeds...</div>
</div>

<!-- CONFLICT MAP -->

<div id="map" class="section">

<iframe
src="https://liveuamap.com">
</iframe>

</div>

<!-- AIRCRAFT WATCH -->

<div id="air" class="section">

<iframe
src="https://globe.adsbexchange.com/">
</iframe>

</div>

<!-- MARINE WATCH -->

<div id="marine" class="section">

<iframe
src="https://www.marinetraffic.com/en/ais/embed/zoom:2/centery:20/centerx:0/maptype:4/shownames:false">
</iframe>

</div>

<footer>
<a href="https://blacksurvivalgear.com" target="_blank">
BlackSurvivalGear.com
</a>
</footer>

<script>

function showTab(id){

document.querySelectorAll(".section")
.forEach(s=>s.classList.remove("active"));

document.getElementById(id).classList.add("active");

document.querySelectorAll(".tabs button")
.forEach(btn=>btn.classList.remove("active"));

document.querySelector(`[onclick="showTab('${id}')"]`)
.classList.add("active");

}

function buildCard(title,link,date,img,source){

if(!img)
img="https://upload.wikimedia.org/wikipedia/commons/6/65/No-Image-Placeholder.svg";

return `

<div class="card">

<img class="thumb" src="${img}">

<div>

<div class="title">${title}</div>
<div class="meta">${source} • ${date}</div>

<a class="link" href="${link}" target="_blank">
Open Source →
</a>

</div>

</div>

`;

}

function loadFeeds(){

const feeds=[

{url:"https://feeds.bbci.co.uk/news/world/rss.xml",name:"BBC"},
{url:"https://www.reutersagency.com/feed/?best-topics=politics",name:"Reuters"},
{url:"https://www.aljazeera.com/xml/rss/all.xml",name:"Al Jazeera"},
{url:"https://apnews.com/rss/apf-topnews",name:"AP"},
{url:"https://www.rt.com/rss/news/",name:"RT"}

];

const keywords=[
"war","conflict","attack","missile","military",
"troops","gaza","ukraine","russia","israel",
"china","taiwan","strike","bomb"
];

const news=document.getElementById("newsFeed");
news.innerHTML="";

feeds.forEach(feed=>{

fetch("https://api.allorigins.win/raw?url="+encodeURIComponent(feed.url))
.then(r=>r.text())
.then(str=>{

const xml=new DOMParser().parseFromString(str,"text/xml");

xml.querySelectorAll("item").forEach(item=>{

const title=item.querySelector("title")?.textContent||"";
const link=item.querySelector("link")?.textContent||"";
const date=item.querySelector("pubDate")?.textContent||"";

const lower=title.toLowerCase();

if(!keywords.some(w=>lower.includes(w))) return;

let img="";
const desc=item.querySelector("description")?.textContent||"";
const m=desc.match(/<img.*?src="(.*?)"/);

if(m) img=m[1];

news.innerHTML+=buildCard(title,link,date,img,feed.name);

});

});

});

}

loadFeeds();
setInterval(loadFeeds,300000);

</script>

</body>
</html>
