<script>

function openTab(tabName){

let tabs=document.querySelectorAll(".tabcontent");

let buttons=document.querySelectorAll(".tabbtn");

tabs.forEach(tab=>tab.style.display="none");

buttons.forEach(btn=>btn.classList.remove("active"));

document.getElementById(tabName).style.display="block";

document.querySelector(`[data-tab='${tabName}']`).classList.add("active");

}



function openSubTab(parent,subtab){

let container=document.querySelector(`#${parent} .subcontent`);

container.querySelectorAll(".subpanel").forEach(p=>{

p.style.display="none";

});

document.getElementById(subtab).style.display="block";

}



function toggleFullscreen(el){

if(!document.fullscreenElement){

el.requestFullscreen();

}else{

document.exitFullscreen();

}

}



window.onload=function(){

openTab("overview");

document.getElementById("hormuz").style.display="block";

}

</script>
