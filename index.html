<script>
function showLive(channel) {
    if (channel === 'quadview') {
        document.getElementById('liveSingle').style.display = 'none';
        document.getElementById('liveQuad').style.display = 'block'; // Display quad view
    } else {
        document.getElementById('liveSingle').style.display = 'block';
        document.getElementById('liveQuad').style.display = 'none'; // Hide quad view
    }
}
</script>
