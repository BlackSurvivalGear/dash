<!DOCTYPE html>

<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>BSG Strategic Awareness</title>

<style>

:root{
--bsg-dark:#071e16;
--bsg-green:#0b2f22;
--bsg-border:#1e5a42;
--bsg-gold:#c6a55a;
--bsg-text:#d7e8df;
}

html,body{
margin:0;
padding:0;
height:100%;
background:var(--bsg-dark);
font-family:Segoe UI,Arial;
color:var(--bsg-text);
}

/* WATERMARK */

body::before{
content:"";
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:900px;
height:900px;
background-image:url("bsg.jpg");
background-size:contain;
background-repeat:no-repeat;
opacity:0.035;
pointer-events:none;
z-index:0;
}

/* HEADER */

.header{
display:flex;
align-items:center;
gap:16px;
padding:16px 22px;
font-size:28px;
border-bottom:1px solid var(--bsg-border);
position:relative;
z-index:1;
}

.logo{
height:84px;
}

/* THREAT */

.threatBox{
margin-left:auto;
display:flex;
align-items:center;
gap:10px;
font-size:14px;
font-weight:600;
}

.threatLevel{
padding:6px 12px;
border-radius:4px;
background:#f0c541;
color:#071e16;
}

/* BREAKING NEWS */

.ticker{
width:100%;
background:var(--bsg-gold);
color:#071e16;
font-weight:600;
overflow:hidden;
white-space:nowrap;
}

.ticker span{
display:inline-block;
padding-left:100%;
animation:ticker 80s linear infinite;
}

@keyframes ticker{
0%{transform:translateX(0);}
100%{transform:translateX(-100%);}
}

/* TABS */

.tabs{
display:flex;
background:var(--bsg-green);
border-bottom:1px solid var(--bsg-border);
}

.tabs button{
padding:12px 18px;
background:var(--bsg-green);
border:none;
color:var(--bsg-text);
cursor:pointer;
border-right:1px solid var(--bsg-border);
}

.tabs button.active{
background:var(--bsg-gold);
color:#071e16;
font-weight:600;
}

.tabs button:hover{
background:#174734;
}

/* PANELS */

.section{
display:none;
padding:12px;
}

.section.active{
display:block;
}

/* NEWS */

.feed{
height:70vh;
overflow:auto;
background:rgba(5,20,14,0.97);
border-radius:6px;
padding:12px;
}

.card{
display:flex;
gap:12px;
padding:12px;
border-bottom:1px solid var(--bsg-border);
background:rgba(7,25,18,0.85);
border-radius:4px;
margin-bottom:6px;
}

.thumb{
width:80px;
height:60px;
object-fit:cover;
border-radius:4px;
}

.title{
font-size:15px;
}

.meta{
font-size:12px;
color:#8fb9a6;
}

.link{
font-size:12px;
color:var(--bsg-gold);
text-decoration:none;
}

/* AIRCRAFT CONTROLS */

.airControls{
margin-bottom:10px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.airControls button{
background:#0b2f22;
border:1px solid var(--bsg-border);
color:var(--bsg-text);
padding:6px 12px;
cursor:pointer;
border-radius:4px;
}

.airControls button.active{
background:var(--bsg-gold);
color:#071e16;
}

/* MARINE CONTROLS */

.marineControls{
margin-bottom:10px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.marineControls button{
background:#0b2f22;
border:1px solid var(--bsg-border);
color:var(--bsg-text);
padding:6px 12px;
cursor:pointer;
border-radius:4px;
}

.marineControls button.active{
background:var(--bsg-gold);
color:#071e16;
}

/* COMMAND OVERVIEW GRID */

.overviewGrid{
display:grid;
grid-template-columns:1fr 1fr;
grid-template-rows:1fr 1fr;
gap:10px;
height:90vh;
}

.overviewPanel{
background:#071e16;
border:1px solid #1e5a42;
border-radius:6px;
overflow:hidden;
position:relative;
}

.overviewTitle{
position:absolute;
top:6px;
left:10px;
background:rgba(0,0,0,0.6);
color:#c6a55a;
padding:4px 8px;
font-size:12px;
border-radius:4px;
z-index:5;
}

.overviewPanel iframe{
width:100%;
height:100%;
border:none;
}

/* MAPS */

iframe{
width:100%;
height:92vh;
border:none;
border-radius:6px;
}

/* FOOTER */

footer{
position:fixed;
bottom:0;
left:0;
width:100%;
background:var(--bsg-dark);
border-top:1px solid var(--bsg-border);
text-align:center;
padding:8px;
font-size:14px;
color:var(--bsg-gold);
}

footer a{
color:var(--bsg-gold);
text-decoration:none;
}

</style>

</head>

<body>

<div class="header">

<img class="logo" src="bsg.jpg">

BSG Strategic Awareness

<div class="threatBox">
GLOBAL THREAT LEVEL
<span class="threatLevel" id="threatLevel">ELEVATED</span>
</div>

</div>

<div class="ticker">
<span id="breakingNews">Loading breaking news...</span>
</div>

<div class="tabs">

<button class="active" onclick="showTab('news')">Conflict News</button> <button onclick="showTab('map')">Conflict Map</button> <button onclick="showTab('air')">Aircraft Watch</button> <button onclick="showTab('marine')">Marine Watch</button> <button onclick="showTab('fire')">Fire Monitor</button> <button onclick="showTab('overview')">Command Overview</button>

</div>

<!-- NEWS -->

<div id="news" class="section active">
<div class="feed" id="newsFeed">Loading intelligence feeds...</div>
</div>

<!-- CONFLICT MAP -->

<div id="map" class="section">
<iframe src="https://liveuamap.com"></iframe>
</div>

<!-- AIRCRAFT -->

<div id="air" class="section">

<div class="airControls">
<button onclick="setAirFilter('military')" class="active">Military</button>
<button onclick="setAirFilter('tankers')">Tankers</button>
<button onclick="setAirFilter('surveillance')">AWACS</button>
<button onclick="setAirFilter('all')">All</button>
</div>

<iframe id="airMap" src="https://globe.adsbexchange.com/?military=1"></iframe>

</div>

<!-- MARINE -->

<div id="marine" class="section">

<div class="marineControls">

<button onclick="setMarine('global')" class="active">Global</button> <button onclick="setMarine('hormuz')">Hormuz</button> <button onclick="setMarine('mandeb')">Bab-el-Mandeb</button> <button onclick="setMarine('suez')">Suez</button> <button onclick="setMarine('bosporus')">Bosporus</button> <button onclick="setMarine('malacca')">Malacca</button>

</div>

<iframe id="marineMap"
src="https://www.marinetraffic.com/en/ais/embed/zoom:2/centery:20/centerx:0/maptype:4">
</iframe>

</div>

<!-- FIRE MONITOR -->

<div id="fire" class="section">

<h3 style="color:#c6a55a;margin-bottom:10px;">
Satellite Fire Detection (NASA FIRMS)
</h3>

<iframe src="https://firms.modaps.eosdis.nasa.gov/map/#d:24hrs;@0,20,2z"></iframe>

</div>

<!-- COMMAND OVERVIEW -->

<div id="overview" class="section">

<div class="overviewGrid">

<div class="overviewPanel">
<div class="overviewTitle">Conflict Map</div>
<iframe src="https://liveuamap.com"></iframe>
</div>

<div class="overviewPanel">
<div class="overviewTitle">Aircraft Watch</div>
<iframe src="https://globe.adsbexchange.com/?military=1"></iframe>
</div>

<div class="overviewPanel">
<div class="overviewTitle">Marine Watch</div>
<iframe src="https://www.marinetraffic.com/en/ais/embed/zoom:2/centery:20/centerx:0/maptype:4"></iframe>
</div>

<div class="overviewPanel">
<div class="overviewTitle">Fire Monitor</div>
<iframe src="https://firms.modaps.eosdis.nasa.gov/map/#d:24hrs;@0,20,2z"></iframe>
</div>

</div>

</div>

<footer>
<a href="https://blacksurvivalgear.com" target="_blank">
BlackSurvivalGear.com
</a>
</footer>

<script>

function showTab(id){

document.querySelectorAll(".section")
.forEach(s=>s.classList.remove("active"));

document.getElementById(id).classList.add("active");

document.querySelectorAll(".tabs button")
.forEach(btn=>btn.classList.remove("active"));

document.querySelector(`[onclick="showTab('${id}')"]`)
.classList.add("active");

}

/* BREAKING NEWS */

function loadBreakingNews(){

const feed="https://feeds.bbci.co.uk/news/world/rss.xml";

fetch("https://api.allorigins.win/raw?url="+encodeURIComponent(feed))
.then(r=>r.text())
.then(str=>{

const xml=new DOMParser().parseFromString(str,"text/xml");

let headlines=[];

xml.querySelectorAll("item").forEach((item,i)=>{

if(i>10)return;

const title=item.querySelector("title")?.textContent||"";

headlines.push(title);

});

document.getElementById("breakingNews").innerText=headlines.join("      ✦      ");

});

}

loadBreakingNews();
setInterval(loadBreakingNews,300000);

/* AIRCRAFT FILTER */

function setAirFilter(type){

const map=document.getElementById("airMap");

const urls={
military:"https://globe.adsbexchange.com/?military=1",
tankers:"https://globe.adsbexchange.com/?icaoType=K35R,K135",
surveillance:"https://globe.adsbexchange.com/?icaoType=E3TF,E3CF,E8",
all:"https://globe.adsbexchange.com/"
};

map.src=urls[type]||urls.all;

}

/* MARINE NAVIGATION */

function setMarine(area){

const map=document.getElementById("marineMap");

const urls={

global:"https://www.marinetraffic.com/en/ais/embed/zoom:2/centery:20/centerx:0/maptype:4",

hormuz:"https://www.marinetraffic.com/en/ais/embed/zoom:7/centery:26.6/centerx:56.3/maptype:4",

mandeb:"https://www.marinetraffic.com/en/ais/embed/zoom:7/centery:12.7/centerx:43.3/maptype:4",

suez:"https://www.marinetraffic.com/en/ais/embed/zoom:7/centery:30.2/centerx:32.5/maptype:4",

bosporus:"https://www.marinetraffic.com/en/ais/embed/zoom:9/centery:41.1/centerx:29.0/maptype:4",

malacca:"https://www.marinetraffic.com/en/ais/embed/zoom:6/centery:2.5/centerx:101.0/maptype:4"

};

map.src=urls[area]||urls.global;

}

/* NEWS FEED */

function buildCard(title,link,date,img,source){

if(!img)
img="https://upload.wikimedia.org/wikipedia/commons/6/65/No-Image-Placeholder.svg";

return `
<div class="card">
<img class="thumb" src="${img}">
<div>
<div class="title">${title}</div>
<div class="meta">${source} • ${date}</div>
<a class="link" href="${link}" target="_blank">Open Source →</a>
</div>
</div>
`;
}

function loadFeeds(){

const feeds=[
{url:"https://feeds.bbci.co.uk/news/world/rss.xml",name:"BBC"},
{url:"https://www.reutersagency.com/feed/?best-topics=politics",name:"Reuters"},
{url:"https://www.aljazeera.com/xml/rss/all.xml",name:"Al Jazeera"},
{url:"https://apnews.com/rss/apf-topnews",name:"AP"},
{url:"https://www.rt.com/rss/news/",name:"RT"}
];

const keywords=[
"war","conflict","attack","missile","military",
"troops","gaza","ukraine","russia","israel",
"china","taiwan","strike","bomb"
];

const news=document.getElementById("newsFeed");
news.innerHTML="";

feeds.forEach(feed=>{

fetch("https://api.allorigins.win/raw?url="+encodeURIComponent(feed.url))
.then(r=>r.text())
.then(str=>{

const xml=new DOMParser().parseFromString(str,"text/xml");

xml.querySelectorAll("item").forEach(item=>{

const title=item.querySelector("title")?.textContent||"";
const link=item.querySelector("link")?.textContent||"";
const date=item.querySelector("pubDate")?.textContent||"";

const lower=title.toLowerCase();

if(!keywords.some(w=>lower.includes(w)))return;

let img="";
const desc=item.querySelector("description")?.textContent||"";
const m=desc.match(/<img.*?src="(.*?)"/);

if(m)img=m[1];

news.innerHTML+=buildCard(title,link,date,img,feed.name);

});

});

});

}

loadFeeds();
setInterval(loadFeeds,300000);

</script>

</body>
</html>
