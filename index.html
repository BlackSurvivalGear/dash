<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BSG Strategic Awareness OSINT</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- SPLASH -->
<div id="splash">
    <video autoplay muted playsinline>
        <source src="header3.mp4" type="video/mp4">
    </video>
</div>

<!-- HEADER -->
<header class="mainHeader">

    <video autoplay muted loop playsinline class="headerVideo">
        <source src="header3.mp4" type="video/mp4">
    </video>

    <div class="headerContent">

        <div class="logoTitle">
            <img src="hero.png" class="headerLogo">
            <h1>Global Strategic Awareness OSINT</h1>
        </div>

        <div id="dateTime"></div>

    </div>

</header>

<!-- MAIN NAV -->
<nav class="mainNav">

<button onclick="showPage('home')" class="navBtn active">Home</button>
<button onclick="showPage('live')" class="navBtn">LIVE NEWS</button>
<button onclick="showPage('market')" class="navBtn">Market</button>
<button onclick="showPage('conflict')" class="navBtn">Conflict Map</button>
<button onclick="showPage('air')" class="navBtn">Aircraft Watch</button>
<button onclick="showPage('marine')" class="navBtn">Marine Watch</button>
<button onclick="showPage('cyber')" class="navBtn">Cyber Attacks</button>
<button onclick="showPage('radio')" class="navBtn">Global Radio</button>

</nav>


<!-- SUB NAV -->
<div id="subNav"></div>


<!-- CONTENT AREA -->
<div id="content">

<!-- HOME -->
<section id="home" class="page active">

<div class="hero">

<img src="hero.png">

<div class="heroText">

<h2>BSG Strategic Awareness Dashboard</h2>

<p>
Integrated OSINT monitoring platform providing real-time intelligence
across conflicts, markets, cyber activity, aviation tracking and maritime movement.
</p>

</div>

</div>

</section>


<!-- LIVE NEWS -->
<section id="live" class="page">

<div class="panelGrid">

<iframe src="https://rumble.com/embed/v33aw1a/?pub=4jw3x3"></iframe>
<iframe src="https://www.youtube.com/embed/gCNeDWCI0vo"></iframe>
<iframe src="https://www.youtube.com/embed/YDvsBbKfLPA"></iframe>
<iframe src="https://www.youtube.com/embed/vfszY1JYbMc"></iframe>

</div>

</section>


<!-- MARKET -->
<section id="market" class="page">

<div class="marketPanel">

<!-- TradingView Widget BEGIN -->
<div class="tradingview-widget-container">
<div class="tradingview-widget-container__widget"></div>

<script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-market-quotes.js" async>
{
"colorTheme": "dark",
"locale": "en",
"width": "100%",
"height": "100%"
}
</script>

</div>
<!-- TradingView Widget END -->

</div>

</section>


<!-- CONFLICT -->
<section id="conflict" class="page">

<iframe src="https://liveuamap.com"></iframe>

</section>


<!-- AIRCRAFT -->
<section id="air" class="page">

<iframe src="https://globe.adsbexchange.com"></iframe>

</section>


<!-- MARINE -->
<section id="marine" class="page">

<iframe src="https://www.marinetraffic.com/en/ais/home/centerx:0/centery:0/zoom:2"></iframe>

</section>


<!-- CYBER -->
<section id="cyber" class="page">

<iframe src="https://threatmap.checkpoint.com"></iframe>

</section>


<!-- RADIO -->
<section id="radio" class="page">

<iframe src="https://radio.garden"></iframe>

</section>

</div>


<!-- FOOTER -->
<footer>

<div class="footerCenter">

<img src="hero.png" class="footerLogo">

<a href="https://BlackSurvivalGear.com" target="_blank">
BlackSurvivalGear.com
</a>

</div>

<div class="version">
BSG Strategic Awareness OSINT — VBASE1
</div>

</footer>


<script>

function showPage(id){

document.querySelectorAll(".page").forEach(p=>{
p.classList.remove("active")
})

document.getElementById(id).classList.add("active")

document.querySelectorAll(".navBtn").forEach(b=>{
b.classList.remove("active")
})

event.target.classList.add("active")

}


function updateClock(){

const now = new Date()

const options = {
weekday:'short',
day:'2-digit',
month:'short',
year:'numeric'
}

const date = now.toLocaleDateString('en-GB',options)

let hours = now.getHours()
let minutes = now.getMinutes()

minutes = minutes < 10 ? "0"+minutes : minutes

let ampm = hours >=12 ? "PM":"AM"
hours = hours % 12
hours = hours ? hours : 12

document.getElementById("dateTime").innerHTML =
`${date}, ${hours}:${minutes}${ampm}`

}

setInterval(updateClock,1000)

updateClock()


window.onload = function(){

setTimeout(()=>{
document.getElementById("splash").style.display="none"
},2500)

}

</script>

</body>
</html>
