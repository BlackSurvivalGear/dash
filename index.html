<!-- NAVIGATION -->

<button data-tab="home" class="active">Home</button>

<!-- HOME -->

This dashboard consolidates open-source intelligence monitoring tools into a unified global situational awareness interface.

</p>

</div>

</div>

</section>


<!-- LIVE NEWS -->

<section id="live" class="tab">

<div class="liveNav">

<button onclick="showLive('rt')">RT</button>
<button onclick="showLive('aj')">Al Jazeera</button>

<iframe id="liveFrame"
src="https://rumble.com/embed/v33aw1a/?pub=4jw3x3"
allowfullscreen></iframe>

</div>

<div id="quadView" class="quadGrid">

<iframe src="https://rumble.com/embed/v33aw1a/?pub=4jw3x3"></iframe>
<iframe src="https://www.youtube.com/embed/gCNeDWCI0vo"></iframe>

BlackSurvivalGear.com
</a>

</footer>


<script>

/* TAB SYSTEM */

document.addEventListener("DOMContentLoaded",function(){

const buttons=document.querySelectorAll("nav button")
const tabs=document.querySelectorAll(".tab")

buttons.forEach(button=>{

button.addEventListener("click",function(){

const target=this.getAttribute("data-tab")

tabs.forEach(tab=>{
tab.classList.remove("active")
})

buttons.forEach(btn=>{
btn.classList.remove("active")
})

document.getElementById(target).classList.add("active")
this.classList.add("active")

})

})

})


/* LIVE NEWS SWITCH */

function showLive(channel){

const frame=document.getElementById("liveFrame")
const single=document.getElementById("liveSingle")
const quad=document.getElementById("quadView")

const streams={

rt:"https://rumble.com/embed/v33aw1a/?pub=4jw3x3",
aj:"https://www.youtube.com/embed/gCNeDWCI0vo",
sky:"https://www.youtube.com/embed/YDvsBbKfLPA",
wion:"https://www.youtube.com/embed/vfszY1JYbMc"

}

if(channel==="quad"){

single.style.display="none"
quad.style.display="grid"

if(!document.fullscreenElement){
quad.requestFullscreen().catch(()=>{})
}

return

}

quad.style.display="none"
single.style.display="block"

frame.src=streams[channel]

}

</script>

</body>
