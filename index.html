<script>


document.addEventListener("DOMContentLoaded",function(){

const buttons=document.querySelectorAll("nav button")
const tabs=document.querySelectorAll(".tab")

buttons.forEach(button=>{

button.addEventListener("click",function(){

const target=this.getAttribute("data-tab")

tabs.forEach(tab=>{
tab.classList.remove("active")
})

buttons.forEach(btn=>{
btn.classList.remove("active")
})

document.getElementById(target).classList.add("active")
this.classList.add("active")

})

})

})



function showLive(channel){

const frame=document.getElementById("liveFrame")
const single=document.getElementById("liveSingle")
const quad=document.getElementById("quadView")

const streams={

rt:"https://rumble.com/embed/v33aw1a/?pub=4jw3x3",
aj:"https://www.youtube.com/embed/bNyUyrR0PHo",
sky:"https://www.youtube.com/embed/YDvsBbKfLPA",
reuters:"https://www.youtube.com/embed/hNTn1EOYPAg"

}

if(channel==="quad"){

single.style.display="none"
quad.style.display="grid"

return

}

quad.style.display="none"
single.style.display="block"

frame.src=streams[channel]

}



/* CRYPTO TICKER */

async function loadCryptoTicker(){

const url="https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=20&page=1"

const res=await fetch(url)
const data=await res.json()

const ticker=document.getElementById("marketTicker")

ticker.innerHTML=""

data.forEach(coin=>{

const change=coin.price_change_percentage_24h||0
const color=change>=0?"#00ff88":"#ff4d4d"
const arrow=change>=0?"▲":"▼"

const item=document.createElement("span")

item.className="ticker-item"

item.innerHTML=`
<span class="ticker-symbol">${coin.symbol.toUpperCase()}</span>
$${coin.current_price.toLocaleString()}
<span style="color:${color}">
${arrow} ${change.toFixed(2)}%
</span>
`

ticker.appendChild(item)

})

}

loadCryptoTicker()
setInterval(loadCryptoTicker,30000)



async function loadMetals(){

try{

const goldRes = await fetch("https://api.gold-api.com/price/XAU")
const gold = await goldRes.json()

const silverRes = await fetch("https://api.gold-api.com/price/XAG")
const silver = await silverRes.json()

document.getElementById("goldPrice").innerText="GOLD $" + Math.round(gold.price)
document.getElementById("silverPrice").innerText="SILVER $" + silver.price.toFixed(2)

}
catch{

document.getElementById("goldPrice").innerText="GOLD --"
document.getElementById("silverPrice").innerText="SILVER --"

}

}

loadMetals()
setInterval(loadMetals,60000)

</script>
