<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BSG Strategic Awareness OSINT</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">

</head>

<body>


<!-- SPLASH -->

<div id="introRadar">
<video autoplay muted playsinline>
<source src="RADAR3.mp4">
</video>
</div>



<!-- HEADER -->

<header class="mainHeader">

<div class="headerVideo">
<video autoplay muted loop playsinline>
<source src="HEADER3.mp4">
</video>
</div>

<div class="headerContent">

<div class="headerLeft">

<div class="radarLogo">
<video autoplay muted loop playsinline>
<source src="RADAR3.mp4">
</video>
</div>

<h1>Global Strategic Awareness OSINT</h1>

</div>

<div id="dateTime"></div>

</div>

</header>



<!-- NAVIGATION -->

<nav>

<button data-tab="home" class="active">Home</button>
<button data-tab="live">LIVE NEWS</button>
<button data-tab="markets">Market</button>
<button data-tab="conflict">Conflict Map</button>
<button data-tab="aircraft">Aircraft Watch</button>
<button data-tab="marine">Marine Watch</button>
<button data-tab="cyber">Cyber Attacks</button>
<button data-tab="radio">Global Radio</button>

</nav>



<!-- SUB MENUS -->

<div id="subMenuBar">

<div id="liveMenu" class="subMenu">

<button onclick="showLive(event,'rt')" class="active">RT</button>
<button onclick="showLive(event,'aj')">Al Jazeera</button>
<button onclick="showLive(event,'sky')">Sky</button>
<button onclick="showLive(event,'bloomberg')">Bloomberg</button>
<button onclick="showLive(event,'quad')">Quad View</button>
<button onclick="fullscreenQuad()">Full Screen</button>

</div>



<div id="marineMenu" class="subMenu">

<button onclick="showMarine(event,'hormuz')" class="active">Hormuz</button>
<button onclick="showMarine(event,'malacca')">Malacca</button>
<button onclick="showMarine(event,'bab')">Bab el-Mandeb</button>
<button onclick="showMarine(event,'suez')">Suez</button>
<button onclick="showMarine(event,'panama')">Panama</button>
<button onclick="showMarine(event,'bosporus')">Bosporus</button>
<button onclick="showMarine(event,'gibraltar')">Gibraltar</button>
<button onclick="showMarine(event,'dover')">Dover</button>

</div>

</div>



<main>



<!-- HOME -->

<section id="home" class="tab active">

<div class="homeHero">

<img src="hero.png" class="heroImage">

<div class="heroOverlay">

<h2>BSG Strategic Awareness Dashboard</h2>

<p>
Integrated OSINT monitoring platform providing real-time intelligence across conflicts,
markets, cyber activity, aviation tracking and maritime movement.
</p>

</div>

</div>

</section>



<!-- LIVE NEWS -->

<section id="live" class="tab">

<div id="liveSingle" class="livePlayer">

<iframe id="liveFrame"
src="https://rumble.com/embed/v33aw1a/?pub=4jw3x3"
allowfullscreen></iframe>

</div>


<div id="liveQuad" class="quadGrid">

<iframe src="https://rumble.com/embed/v33aw1a/?pub=4jw3x3"></iframe>
<iframe src="https://www.youtube.com/embed/gCNeDWCI0vo"></iframe>
<iframe src="https://www.youtube.com/embed/9Auq9mYxFEE"></iframe>
<iframe src="https://www.youtube.com/embed/iEpJwprxDdk"></iframe>

</div>

</section>



<!-- MARKETS -->

<section id="markets" class="tab">

<iframe src="https://www.tradingview.com/markets/"></iframe>

</section>



<!-- CONFLICT -->

<section id="conflict" class="tab">

<iframe src="https://iran.liveuamap.com"></iframe>

</section>



<!-- AIRCRAFT -->

<section id="aircraft" class="tab">

<iframe src="https://globe.adsbexchange.com"></iframe>

</section>



<!-- MARINE WATCH -->

<section id="marine" class="tab">

<iframe id="marineFrame"
src="https://www.marinetraffic.com/en/ais/embed/zoom:2/maptype:4"
allowfullscreen></iframe>

</section>



<!-- CYBER -->

<section id="cyber" class="tab">

<iframe src="https://threatmap.checkpoint.com"></iframe>

</section>



<!-- RADIO -->

<section id="radio" class="tab">

<iframe src="https://radio.garden/"></iframe>

</section>



</main>



<!-- FOOTER -->

<footer class="mainFooter">

<div class="footerTop">

<video autoplay muted loop playsinline>
<source src="RADAR3.mp4">
</video>

</div>


<div class="footerBottom">

<div class="footerCenter">

<a href="https://BlackSurvivalGear.com" target="_blank">
BlackSurvivalGear.com
</a>

</div>

<div class="footerRight">

BSG Strategic Awareness OSINT — VBASE

</div>

</div>

</footer>



<script>



/* SPLASH */

window.addEventListener("load",()=>{

const splash=document.getElementById("introRadar")

setTimeout(()=>{

splash.style.opacity="0"

setTimeout(()=>{ splash.remove() },600)

},1800)

})



/* CLOCK */

function updateClock(){

const now=new Date()

const days=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"]
const months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"]

let day=days[now.getDay()]
let date=now.getDate()
let month=months[now.getMonth()]
let year=now.getFullYear()

let hours=now.getHours()
let minutes=now.getMinutes()

let ampm=hours>=12?"PM":"AM"

hours=hours%12
hours=hours?hours:12

minutes=minutes<10?"0"+minutes:minutes

document.getElementById("dateTime").textContent =
`${day} ${date} ${month} ${year}, ${hours}:${minutes}${ampm}`

}

setInterval(updateClock,1000)
updateClock()



/* TAB SYSTEM */

document.querySelectorAll("nav button").forEach(btn=>{

btn.onclick=()=>{

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))
document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"))

btn.classList.add("active")
document.getElementById(btn.dataset.tab).classList.add("active")

const subMenu=document.getElementById("subMenuBar")

document.getElementById("liveMenu").style.display="none"
document.getElementById("marineMenu").style.display="none"

if(btn.dataset.tab==="live"){
subMenu.style.display="block"
document.getElementById("liveMenu").style.display="flex"
}

else if(btn.dataset.tab==="marine"){

subMenu.style.display="block"
document.getElementById("marineMenu").style.display="flex"

document.getElementById("marineFrame").src =
"https://www.marinetraffic.com/en/ais/embed/zoom:2/maptype:4"

}

else{
subMenu.style.display="none"
}

}

})



/* LIVE CHANNEL SWITCH */

function showLive(e,channel){

document.querySelectorAll("#liveMenu button").forEach(b=>b.classList.remove("active"))
e.target.classList.add("active")

const frame=document.getElementById("liveFrame")
const single=document.getElementById("liveSingle")
const quad=document.getElementById("liveQuad")

single.style.display="block"
quad.style.display="none"

if(channel==="rt")
frame.src="https://rumble.com/embed/v33aw1a/?pub=4jw3x3"

if(channel==="aj")
frame.src="https://www.youtube.com/embed/gCNeDWCI0vo"

if(channel==="sky")
frame.src="https://www.youtube.com/embed/9Auq9mYxFEE"

if(channel==="bloomberg")
frame.src="https://www.youtube.com/embed/iEpJwprxDdk"

if(channel==="quad"){
single.style.display="none"
quad.style.display="grid"
}

}



/* MARINE CHOKE POINTS */

function showMarine(e,point){

document.querySelectorAll("#marineMenu button").forEach(b=>b.classList.remove("active"))
e.target.classList.add("active")

const frame=document.getElementById("marineFrame")

let url="https://www.marinetraffic.com/en/ais/embed/maptype:4/"

if(point==="hormuz") url+="zoom:6/lat:26.5/lon:56"
if(point==="malacca") url+="zoom:6/lat:2.5/lon:101"
if(point==="bab") url+="zoom:6/lat:12.6/lon:43.3"
if(point==="suez") url+="zoom:6/lat:30.2/lon:32.3"
if(point==="panama") url+="zoom:6/lat:9.2/lon:-79.9"
if(point==="bosporus") url+="zoom:6/lat:41.1/lon:29"
if(point==="gibraltar") url+="zoom:6/lat:36/lon:-5.3"
if(point==="dover") url+="zoom:6/lat:51/lon:1"

frame.src=url

}

</script>

</body>
</html>
