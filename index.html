<script>

/* CLOCK */

function updateClock(){

const now=new Date()

const days=["SUN","MON","TUE","WED","THU","FRI","SAT"]
const months=["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"]

let day=days[now.getDay()]
let date=now.getDate()
let month=months[now.getMonth()]
let year=now.getFullYear()

let hours=now.getHours()
let minutes=now.getMinutes()

let ampm=hours>=12?"PM":"AM"

hours=hours%12
hours=hours?hours:12

minutes=minutes<10?"0"+minutes:minutes

document.getElementById("dateTime").textContent =
`${day} ${date} ${month} ${year} • ${hours}:${minutes}${ampm}`

}

updateClock()
setInterval(updateClock,1000)



/* NAVIGATION */

document.querySelectorAll("nav button").forEach(btn=>{

btn.addEventListener("click",function(){

document.querySelectorAll(".tab").forEach(tab=>{
tab.classList.remove("active")
})

document.querySelectorAll("nav button").forEach(b=>{
b.classList.remove("active")
})

this.classList.add("active")

const target=document.getElementById(this.dataset.tab)

if(target){
target.classList.add("active")
}

})

})



/* LIVE SWITCH */

function showLive(channel){

const frame=document.getElementById("liveFrame")
const single=document.getElementById("liveSingle")
const quad=document.getElementById("liveQuad")

single.style.display="block"
quad.style.display="none"

if(channel==="rt"){frame.src="https://rumble.com/embed/v33aw1a/?pub=4jw3x3"}
if(channel==="aj"){frame.src="https://www.youtube.com/embed/gCNeDWCI0vo"}
if(channel==="sky"){frame.src="https://www.youtube.com/embed/YDvsBbKfLPA"}
if(channel==="wion"){frame.src="https://www.youtube.com/embed/vfszY1JYbMc"}

if(channel==="quad"){
single.style.display="none"
quad.style.display="grid"
}

}



/* MARKET PANELS */

function showMarketPanel(panel){

document.querySelectorAll(".marketPanel").forEach(p=>{
p.style.display="none"
})

document.getElementById("market"+panel.charAt(0).toUpperCase()+panel.slice(1)).style.display="block"

}



/* SPLASH EXIT */

window.addEventListener("load",function(){

const splash=document.getElementById("introRadar")

setTimeout(function(){

splash.style.opacity="0"

setTimeout(function(){
splash.style.display="none"
},500)

},1500)

})
