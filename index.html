<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BSG Strategic Awareness Dashboard</title>

<link rel="stylesheet" href="style.css">

<script>

function openTab(tabName) {

var i;
var x = document.getElementsByClassName("tabcontent");

for (i = 0; i < x.length; i++) {
x[i].style.display = "none";
}

document.getElementById(tabName).style.display = "block";
}


function setMap(lat, lon, zoom) {

const map = document.getElementById("maritimeMap");

map.src = "https://liveuamap.com/en?lat=" + lat + "&lon=" + lon + "&zoom=" + zoom;

}

</script>

</head>

<body>

<header>

<h1>BSG Strategic Awareness Dashboard</h1>

</header>


<div class="tabs">

<button onclick="openTab('overview')">Overview</button>
<button onclick="openTab('live')">Live News</button>
<button onclick="openTab('markets')">Markets</button>
<button onclick="openTab('maritime')">Maritime</button>
<button onclick="openTab('radio')">Global Radio</button>

</div>


<!-- OVERVIEW -->

<div id="overview" class="tabcontent">

<div class="overview-grid">

<div class="overview-left">

<iframe src="https://liveuamap.com" frameborder="0"></iframe>

</div>

<div class="overview-right">

<iframe src="https://rumble.com/embed/v33aw1a/?pub=4jw3x3" frameborder="0"></iframe>

<iframe src="https://www.youtube.com/embed/bNyUyrR0PHo" frameborder="0"></iframe>

</div>

</div>

</div>



<!-- LIVE NEWS -->

<div id="live" class="tabcontent">

<div class="quad-grid">

<iframe src="https://www.youtube.com/embed/bNyUyrR0PHo"></iframe>
<iframe src="https://www.youtube.com/embed/NQjabLGdP5g"></iframe>
<iframe src="https://www.youtube.com/embed/pykpO5kQJ98"></iframe>
<iframe src="https://www.youtube.com/embed/9Auq9mYxFEE"></iframe>

</div>

</div>



<!-- MARKETS -->

<div id="markets" class="tabcontent">

<div class="quad-grid">

<iframe src="https://s.tradingview.com/embed-widget/market-quotes/?locale=en"></iframe>

<iframe src="https://s.tradingview.com/embed-widget/crypto-screener/?locale=en"></iframe>

<iframe src="https://s.tradingview.com/embed-widget/forex-cross-rates/?locale=en"></iframe>

<iframe src="https://cryptobubbles.net"></iframe>

</div>

</div>



<!-- MARITIME TAB -->

<div id="maritime" class="tabcontent">

<div class="subnav">

<button onclick="setMap(26.5,56.5,6)">Hormuz</button>

<button onclick="setMap(2.5,101.0,6)">Malacca</button>

<button onclick="setMap(30.5,32.5,6)">Suez</button>

<button onclick="setMap(12.7,43.3,6)">Bab el-Mandeb</button>

<button onclick="setMap(9.0,-79.5,6)">Panama Canal</button>

<button onclick="setMap(41.1,29.0,7)">Bosporus</button>

<button onclick="setMap(40.2,26.4,7)">Dardanelles</button>

<button onclick="setMap(36.0,-5.4,7)">Gibraltar</button>

</div>


<div class="map-container">

<iframe
id="maritimeMap"
src="https://liveuamap.com"
frameborder="0"
allowfullscreen>
</iframe>

</div>

</div>



<!-- GLOBAL RADIO -->

<div id="radio" class="tabcontent">

<div class="quad-grid">

<iframe src="https://radio.garden/visit/london"></iframe>

<iframe src="https://radio.garden/visit/lagos"></iframe>

<iframe src="https://radio.garden/visit/washington-dc"></iframe>

<iframe src="https://radio.garden/visit/moscow"></iframe>

</div>

</div>



<footer>

BlackSurvivalGear.com

</footer>

</body>

</html>
